[tool.poetry]
package-mode = false
[build-system]
requires = ["setuptools>=64.0"]
build-backend = "setuptools.build_meta" 
[project]
name = "multi-evolve"
version = "0.1.0"
description = "Streamlit app"
requires-python = ">=3.10"
dependencies = [
  "streamlit",
  "pandas",
  "numpy",
  "biopython",
  "wandb"
]
